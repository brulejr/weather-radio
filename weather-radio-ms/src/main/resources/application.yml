server:
  port: 3300

management:
  endpoints:
    web:
      base-path: /mgmt
      exposure:
        include: health,info,metrics,prometheus
  health:
    show-details: always
    mongo.enabled: false

management.info:
  build.enabled: true
  env.enabled: true
  java.enabled: true
  os.enabled: true

info:
  app:
    name: ${spring.application.name}
    description: RTL433 data processing pipeline for rtl_433 MQTT events
    profile: ${spring.profiles.active}

application.ingestion:
  enabled: true
  mode: tcp
  station-name: NOAA Weather Radio Burlington
  station-call-sign: KIG60
  region-name: South Burlington, VT
  frequency-mhz: 162.425
  tcp-host: rtlsdr01.brulenet.dev
  tcp-port: 7355
  sample-rate-hz: 22050
  segment-duration: 20s
  output-dir: ./var/weather-radio/audio
  reconnect-delay: 5s

application.analysis:
  enabled: true
  low-rms-threshold: 600.0
  voice-rms-threshold: 1800.0
  tone-zero-crossing-threshold: 0.20
  same-zero-crossing-threshold: 0.14
