server:
  port: 3300

management:
  endpoints:
    web:
      base-path: /mgmt
      exposure:
        include: health,info,metrics,prometheus
  health:
    show-details: always
    mongo.enabled: false

management.info:
  build.enabled: true
  env.enabled: true
  java.enabled: true
  os.enabled: true

info:
  app:
    name: ${spring.application.name}
    description: RTL433 data processing pipeline for rtl_433 MQTT events
    profile: ${spring.profiles.active}

application:

  radio-input:
    enabled: true
    mode: SYNTHETIC
    publish-interval-ms: 250
    sample-rate-hz: 22050
    channel-count: 1
    stations:
      - station-id: noaa-burlington
        display-name: NOAA Burlington
        frequencyMHz: 162.475
        county-codes:
          - "05007"
          - "50007"
