server:
  port: 3300

management:
  endpoints:
    web:
      base-path: /mgmt
      exposure:
        include: health,info,metrics,prometheus
  health:
    show-details: always
    mongo.enabled: false

management.info:
  build.enabled: true
  env.enabled: true
  java.enabled: true
  os.enabled: true

info:
  app:
    name: ${spring.application.name}
    description: RTL433 data processing pipeline for rtl_433 MQTT events
    profile: ${spring.profiles.active}

application:

  radio-input:
    enabled: true
    mode: SYNTHETIC
    publish-interval-ms: 250
    sample-rate-hz: 22050
    channel-count: 1
    inject-synthetic-same: true
    synthetic-same-interval-frames: 20
    stations:
      - station-id: noaa-burlington
        display-name: NOAA Burlington
        frequencyMHz: 162.475
        county-codes:
          - "05007"
          - "50007"

  same-decoder:
    enabled: true
    window-duration-ms: 3000
    min-frames-per-window: 2
    min-confidence: 0.80
    debug-logging: false

  alert-orchestration:
    enabled: true
    local-county-codes:
      - "05007"
      - "50007"
    trigger-recording-on-open: true
    duplicate-suppression-minutes: 15
    debug-logging: true

  audio-capture:
    enabled: true
    pre-roll-ms: 5000
    post-roll-ms: 15000
    max-concurrent-captures-per-station: 1
    debug-logging: true

  observability:
    enabled: true
    log-heartbeats: true
    log-audio-frames: false
    log-same-rejected: true
